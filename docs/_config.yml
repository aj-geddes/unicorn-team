title: "10X Developer Unicorn — Claude Code Plugin"
tagline: "Agent orchestration plugin for Claude Code with TDD, code review, and architecture agents"
description: "A Claude Code plugin with 5 AI agents and 13 composable skills that encode the hidden 80% of software engineering — TDD enforcement, code review, architecture design, security audits, and estimation. Install with one command."
url: "https://aj-geddes.github.io"
baseurl: "/unicorn-team"
author:
  name: "aj-geddes"
  url: "https://github.com/aj-geddes"
repository: "aj-geddes/unicorn-team"
logo: /assets/images/og-image.png
twitter:
  card: summary_large_image
social:
  name: "10X Developer Unicorn"
  links:
    - "https://github.com/aj-geddes/unicorn-team"

# SEO
lang: en
keywords:
  - claude code plugin
  - claude code agents
  - claude code skills
  - AI coding assistant
  - TDD automation
  - code review agent
  - AI software engineering
  - claude code orchestrator
  - AI development tools
  - anthropic claude plugin

markdown: kramdown
permalink: /:title/

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md

sass:
  style: compressed

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      image: /assets/images/hero.png
